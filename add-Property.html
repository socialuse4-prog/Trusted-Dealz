<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Property - Trusted Deals</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
body {font-family: Arial; background:#f5f5f5; padding:20px;}
form {max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
input, textarea {width:100%; padding:8px; margin:5px 0 15px 0; border-radius:5px; border:1px solid #ccc;}
button {background:#007bff; color:white; padding:10px 15px; border:none; border-radius:5px; cursor:pointer;}
button:hover {background:#0056b3;}
</style>
</head>
<body>

<h2>Add Property</h2>
<form id="addPropertyForm">
  <label>Title:</label>
  <input type="text" id="title" required>
  
  <label>Size (e.g., 500 sq ft):</label>
  <input type="text" id="size" required>
  
  <label>Demand:</label>
  <input type="text" id="demand" required>
  
  <label>Monthly Rent:</label>
  <input type="text" id="rent">
  
  <label>Transfer From:</label>
  <input type="text" id="transfer">
  
  <label>Location (Google Maps link):</label>
  <input type="text" id="location">
  
  <label>Cell Number:</label>
  <input type="text" id="contact" required>
  
  <label>Property Images (comma-separated URLs, max 4):</label>
  <input type="text" id="images" placeholder="https://link1.jpg, https://link2.jpg, ..." required>
  
  <button type="submit">Add Property</button>
</form>

<script>
// Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDaB6-reBh0HnHfExefki4J04b9ZOu_eGk",
    authDomain: "trusted-dealz.firebaseapp.com",
    projectId: "trusted-dealz",
    storageBucket: "trusted-dealz.firebasestorage.app",
    messagingSenderId: "890053361790",
    appId: "1:890053361790:web:76471149c9aa95633b182f"
  };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Add Property Function =====
document.getElementById('addPropertyForm').addEventListener('submit', e=>{
  e.preventDefault();

  const title = document.getElementById('title').value;
  const size = document.getElementById('size').value;
  const demand = document.getElementById('demand').value;
  const rent = document.getElementById('rent').value;
  const transfer = document.getElementById('transfer').value;
  const location = document.getElementById('location').value;
  const contact = document.getElementById('contact').value;
  const images = document.getElementById('images').value;

  db.collection("properties").add({
    title, size, demand, rent, transfer, location, contact, images
  }).then(()=>{
    alert('Property added successfully!');
    document.getElementById('addPropertyForm').reset();
  }).catch(err=>{
    console.error(err);
    alert('Error adding property');
  });
});
</script>
</body>
</html>
