<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trusted Deals - Properties</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header, footer {text-align:center; padding:15px; background:#007bff; color:white;}
nav a {color:white; margin:0 10px; text-decoration:none;}
.container {max-width:1200px; margin:auto; padding:15px;}

/* GRID: 4 CARDS PER ROW DESKTOP */
.grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:20px;
}
/* Tablet 2 per row */
@media(max-width:992px){
  .grid{grid-template-columns: repeat(2, 1fr);}
}
/* Mobile 1 per row */
@media(max-width:600px){
  .grid{grid-template-columns: 1fr;}
}

.card {
  background:white;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}
.card:hover {box-shadow:0 5px 15px rgba(0,0,0,0.2);}

.slider-container {position:relative;}
.main-img {
  width: 100%;
  height: 260px;        /* FIXED HEIGHT */
  object-fit: cover;    /* CROPS IMAGE PROPERLY */
  border-radius: 8px;
}
.main-img:hover {transform:scale(1.05);}
.thumbnails {display:flex; gap:5px; margin-top:5px; justify-content:center;}
.thumbnails img {
  width: 55px;
  height: 70px;
  object-fit: cover;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid transparent;
}

.thumbnails img.active {
  border-color: #007bff;
}

.card-content {padding:10px; display:flex; flex-direction:column; gap:5px;}
.card-content h3 {margin:0; font-size:16px; color:#007bff;}
.card-content p {margin:0; font-size:14px; color:#333;}
.actions {margin-top:5px; display:flex; gap:5px;}
.actions a {text-decoration:none; padding:5px 8px; border-radius:5px; font-size:13px; color:white;}
.actions a.whatsapp {background:#25D366;}
.actions a.map {background:#6c757d;}
.actions a.quote {background:#ff6600;}
.actions a.quote:hover {background:#e65c00;}
</style>
</head>
<body>

<header>
  <h1>🏡 Trusted Deals</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="add-property.html">Add Property</a>
  </nav>
</header>

<div class="container">
  <div class="grid" id="propertyGrid"></div>
</div>

<footer>
  <p>Contact: <a href="mailto:info@propertyportal.com" style="color:#25D366;">info@propertyportal.com</a> | WhatsApp: <a href="https://wa.me/923005643322" style="color:#25D366;">+92 300 5643322</a></p>
</footer>

<script>
//
  const firebaseConfig = {
    apiKey: "AIzaSyDaB6-reBh0HnHfExefki4J04b9ZOu_eGk",
    authDomain: "trusted-dealz.firebaseapp.com",
    projectId: "trusted-dealz",
    storageBucket: "trusted-dealz.firebasestorage.app",
    messagingSenderId: "890053361790",
    appId: "1:890053361790:web:76471149c9aa95633b182f"
  };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Load Properties =====
db.collection("properties").onSnapshot(snapshot=>{
  let html = "";
  snapshot.forEach(doc=>{
    const p = doc.data();
    const images = p.images ? p.images.split(',').map(url=>url.trim()) : ["https://via.placeholder.com/400x500"];

    html += `
    <div class="card">
      <div class="slider-container">
        <img class="main-img" src="${images[0]}">
        <div class="thumbnails">
          ${images.map((img,idx)=>`<img src="${img}" class="thumb ${idx===0?'active':''}">`).join('')}
        </div>
      </div>
      <div class="card-content">
        <h3>${p.title}</h3>
        <p><b>Size:</b> ${p.size}</p>
        <p><b>Demand:</b> ${p.demand}</p>
        <p><b>Monthly Rent:</b> ${p.rent || 'N/A'}</p>
        <p><b>Transfer:</b> ${p.transfer || 'N/A'}</p>
        <div class="actions">
          <a class="whatsapp" href="https://wa.me/${p.contact.replace(/\D/g,'')}?text=I am interested in your project kindly arrange a call" target="_blank">WhatsApp</a>
          <a class="quote" onclick="leadCapture('${doc.id}')">Get Quote</a>
          <a class="map" href="${p.location}" target="_blank">View Map</a>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("propertyGrid").innerHTML = html;

  // Thumbnail click functionality
  document.querySelectorAll('.card').forEach(card=>{
    const mainImg = card.querySelector('.main-img');
    const thumbs = card.querySelectorAll('.thumb');
    thumbs.forEach(thumb=>{
      thumb.addEventListener('click', e=>{
        e.stopPropagation();
        mainImg.src = thumb.src;
        thumbs.forEach(t=>t.classList.remove('active'));
        thumb.classList.add('active');
      });
    });
  });
});

// ===== Lead Capture =====
function leadCapture(propertyId){
  const name = prompt("Enter your Name:");
  const phone = prompt("Enter your Phone Number:");
  const city = prompt("Enter your City:");
  if(name && phone && city){
    db.collection("leads").add({
      propertyId, name, phone, city, timestamp: new Date()
    }).then(()=>alert("Lead submitted successfully!"));
  }
}
</script>

</body>
</html>
